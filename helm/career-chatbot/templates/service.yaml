apiVersion: v1
kind: Service
metadata:
  name: {{ include "career-chatbot.fullname" . }}
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    {{- include "career-chatbot.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: {{ .Values.service.type }}
